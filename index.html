<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcadeBox</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<!-- new safe Supabase NUR EINMAL, ganz oben im body -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
<div id="login">
  <div class="login-box">
    <h1>Arcade<span>Box</span></h1>
    <div class="auth-tabs">
      <button class="tab active" data-tab="login">Anmelden</button>
      <button class="tab" data-tab="register">Registrieren</button>
    </div>
    <div id="form-login" class="auth-form active">
      <input id="login-name" placeholder="Benutzername" maxlength="20">
      <input id="login-pass" type="password" placeholder="Passwort">
      <button id="btn-login">Einloggen</button>
    </div>
    <div id="form-register" class="auth-form">
      <input id="reg-name" placeholder="Benutzername" maxlength="20">
      <input id="reg-pass" type="password" placeholder="Passwort (min. 4 Zeichen)">
      <input id="reg-pass2" type="password" placeholder="Passwort wiederholen">
      <button id="btn-register">Konto erstellen</button>
    </div>
    <div id="login-err"></div>
  </div>
</div>
 
<!-- HAUPTSEITE -->
<div id="app">
  <header>
    <div class="logo">Arcade<span>Box</span></div>
    <div class="user-info">
<img id="avatar" class="avatar" src="" alt="">
<span>Hallo, <strong id="username"></strong></span>
<button class="btn-sm" id="btn-logout">Abmelden</button>
</div>
  </header>
  <div class="hero"><h1>Bereit zum <em>Zocken</em>?</h1><p>Zwei Spiele, dein Highscore wird gespeichert.</p></div>
  <div class="cards">
    <div class="card" id="card-memory"> <div class="em">🧠</div> <h3>Farb-Gedaechtnis</h3> <p>Merke dir die
    Reihenfolge der Farben!</p> </div>
    <div class="card" id="card-stack"><div class="em">🧱</div><h3>Turm-Stapler</h3><p>Staple perfekt — jeder Fehler kostet Breite!</p></div>
  </div>
  <div class="hs-section"><h3>🏆 Deine Highscores</h3><div id="hs-list"></div></div>
</div>
 
<div class="hs-section global-board">
<h3>Globales Scoreboard — Top 10</h3>
<div id="global-hs">Lädt...</div>
</div

<!-- POPUP -->
<div id="popup">
  <div class="pbox">
    <div class="ptop"><span id="gtitle">Spiel</span><button id="btn-x">✕</button></div>
    <canvas id="c" width="380" height="420"></canvas>

    <div id="memory-pads" class="memory-pads"> <div class="pad" data-color="green" id="pad-green"></div> <div
    class="pad" data-color="red" id="pad-red"></div> <div class="pad" data-color="blue" id="pad-blue"></div> <div
    class="pad" data-color="yellow" id="pad-yellow"></div> </div> <div id="memory-status" class="memory-status"></div>


    <div class="pbot"><span>Punkte: <b id="pts">0</b></span><button id="btn-again">Nochmal</button></div>
  </div>
</div>
 
<!-- script.js NUR EINMAL, ganz unten -->
<script src="script.js"></script>
</body>
</html>
